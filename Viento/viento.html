<!DOCTYPE html>
<html lang="es">
<head>
    <title>WRF-Viento | Movimiento de Flujo</title>
    <meta charset="utf-8"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* ESTILOS REGENERADOS PARA VIENTO */
        body { margin:0; background:#000; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; overflow: hidden; }
        #map { height:100vh; width: 100%; background: #000; cursor: crosshair; }

        #panel {
            position:absolute; top:15px; left:15px; z-index:1000;
            background:rgba(10, 10, 10, 0.95); padding:18px; border-radius:10px; 
            border: 1px solid #444; width:260px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .label { font-size: 11px; color: #00d4ff; text-transform: uppercase; margin: 15px 0 8px 0; letter-spacing: 1.5px; font-weight: 800; border-left: 3px solid #00d4ff; padding-left: 8px; }
        
        button { 
            width: 100%; margin: 4px 0; padding: 10px; background: #222; color: #ccc; 
            border: 1px solid #444; cursor: pointer; border-radius: 5px; font-size: 12px; font-weight: 600; text-align: left; 
        }
        button.active { background: #00d4ff; color: #000; border-color: #fff; box-shadow: 0 0 10px rgba(0,212,255,0.3); }

        .time-slider-box { background: #1a1a1a; padding: 15px; border-radius: 5px; border: 1px solid #333; margin-top: 10px; }
        .time-display { display: flex; justify-content: space-between; color: #00d4ff; font-size: 13px; margin-top: 8px; font-weight: bold; }
        input[type=range] { width: 100%; accent-color: #00d4ff; cursor: pointer; }

        /* Estilos para que el menú colapsable se vea bien */
        .collapsible-header { background: #1a1a1a; padding: 10px; border-radius: 5px; border: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; margin-top: 15px; font-size: 11px; font-weight: bold; color: #888; }
        .collapsible-content { background: #0a0a0a; padding: 12px; border: 1px dotted #444; border-top: none; }

        #legend { 
            position: absolute; bottom: 30px; left: 20px; z-index: 1000;
            background: rgba(10, 10, 10, 0.9); padding: 15px 18px; border-radius: 4px; 
            border-left: 4px solid #00d4ff; width: 300px;
        }
        .legend-title { font-size: 12px; text-align: center; font-weight: 900; margin-bottom: 10px; color: #00d4ff; text-transform: uppercase; }
        .cbar { width: 100%; height: 12px; border: 1px solid #444; }
        .labels { display: flex; justify-content: space-between; font-size: 10px; margin-top: 6px; color: #fff; }
    </style>
</head>
<body>

<div id="panel">
    <div style="text-align:center; color:#00d4ff; font-weight:900; margin-bottom:15px; border-bottom:2px solid #333; padding-bottom:10px; letter-spacing: 1px;">
        MOVIMIENTO DE VIENTO WRF
    </div>
    
    <div class="label">Nivel de Altura</div>
    <button onclick="updateVar('viento_10m', this)" class="active">💨 Viento a 10m</button>
    <button onclick="updateVar('viento_100m', this)">💨 Viento a 100m</button>
    <button onclick="updateVar('viento_200m', this)">💨 Viento a 200m</button>

    <div class="label">Pronóstico</div>
    <div class="time-slider-box">
        <input type="range" id="time-slider" min="0" max="72" step="6" value="0" oninput="updateHour(this.value)">
        <div class="time-display">
            <span>T+0h</span>
            <span id="time-val">Actual</span>
            <span>T+72h</span>
        </div>
    </div>

    <div class="label">Configuración</div>
    <div style="padding: 5px;">
        <div style="font-size: 10px; color: #888; margin-bottom: 5px;">DENSIDAD</div>
        <input type="range" id="opt-paths" min="1000" max="15000" step="500" value="5000" oninput="loadData()">
        <div style="font-size: 10px; color: #888; margin-top: 10px; margin-bottom: 5px;">VELOCIDAD</div>
        <input type="range" id="opt-speed" min="0.001" max="0.02" step="0.001" value="0.008" oninput="loadData()">
    </div>
</div>

<div id="map"></div>

<div id="legend">
    <div id="legend-title" class="legend-title">Velocidad del Viento (km/h)</div>
    <div id="legend-bar" class="cbar" style="background: linear-gradient(to right, #081d58, #253494, #41b6c4, #ffffd9, #f03b20);"></div>
    <div id="legend-labels" class="labels">
        <span>0</span><span>25</span><span>50</span><span>75</span><span>100+</span>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://d3js.org/d3.v4.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>
<script src="https://ihcantabria.github.io/Leaflet.CanvasLayer.Field/dist/leaflet.canvaslayer.field.js"></script>

<script>
    const map = L.map('map', {
        center: [23.5, -102], zoom: 5.5, zoomControl: false,
        layers: [L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png')]
    });

    const dataPath = "D/"; // Asegúrate que los .asc estén en la carpeta D
    let currentVar = 'viento_10m', currentHour = 0, scalarLayer = null, vectorLayer = null;

    const windColors = ['#081d58','#253494','#225ea8','#1d91c0','#41b6c4','#7fcdbb','#edf8b1','#ffffd9','#fed976','#f03b20'];

    function loadData() {
        if (scalarLayer) map.removeLayer(scalarLayer);
        if (vectorLayer) map.removeLayer(vectorLayer);

        const hStr = currentHour.toString().padStart(2, '0');
        const t = Date.now();

        // 1. Capa de Colores (Escalar)
        d3.text(`${dataPath}${currentVar}_${hStr}h.asc?${t}`, (err, data) => {
            if (err) return;
            let field = L.ScalarField.fromASCIIGrid(data);
            field.grid = field.grid.map(r => r.map(v => v !== null ? v * 3.6 : null)); // Convertir a km/h
            
            let scale = chroma.scale(windColors).domain([0, 100]);
            scalarLayer = L.canvasLayer.scalarField(field, {
                color: scale, opacity: 0.6, interpolate: true
            }).addTo(map);
        });

        // 2. Capa de Partículas (Vectores U y V)
        const altura = currentVar.split('_')[1]; // extrae '10m', '100m', etc.
        d3.text(`${dataPath}viento_u_${altura}_${hStr}h.asc?${t}`, (eU, u) => {
            d3.text(`${dataPath}viento_v_${altura}_${hStr}h.asc?${t}`, (eV, v) => {
                if (!eU && !eV) {
                    const vf = L.VectorField.fromASCIIGrids(u, v);
                    vectorLayer = L.canvasLayer.vectorFieldAnim(vf, {
                        paths: parseInt(document.getElementById('opt-paths').value),
                        velocityScale: parseFloat(document.getElementById('opt-speed').value),
                        opacity: 0.5,
                        color: 'white'
                    }).addTo(map);
                }
            });
        });
    }

    function updateHour(h) {
        currentHour = parseInt(h);
        document.getElementById('time-val').innerText = `+${h.padStart(2, '0')}h`;
        loadData();
    }

    function updateVar(v, btn) {
        currentVar = v;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadData();
    }

    loadData();
</script>
</body>
</html>
